name: WSR Backfill — Acquisition Stores

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Store group'
        required: true
        type: choice
        options:
          - km
          - mm
      year:
        description: 'Year to backfill (2024, 2025, or 2026)'
        required: true
        type: choice
        options:
          - '2024'
          - '2025'
          - '2026'
      no_skip:
        description: 'Re-process weeks already in Supabase?'
        required: false
        type: boolean
        default: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour max

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Create .env file
        run: |
          echo "KM_SITE_USERNAME=${{ secrets.KM_SITE_USERNAME }}" >> .env
          echo "KM_SITE_PASSWORD=${{ secrets.KM_SITE_PASSWORD }}" >> .env
          echo "MM_SITE_USERNAME=${{ secrets.MM_SITE_USERNAME }}" >> .env
          echo "MM_SITE_PASSWORD=${{ secrets.MM_SITE_PASSWORD }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}" >> .env
          echo "SENDER_PASSWORD=${{ secrets.SENDER_PASSWORD }}" >> .env
          echo "RECIPIENT_EMAILS=${{ secrets.RECIPIENT_EMAILS }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env

      - name: Run Backfill (skip existing)
        if: ${{ !inputs.no_skip }}
        env:
          DEBUG: ''
          PYTHONUNBUFFERED: '1'
          WSR_PROFILE: ${{ inputs.profile }}
        run: |
          echo "🔄 Backfilling ${{ inputs.profile }} — Year ${{ inputs.year }}"
          python wsr_backfill.py --profile ${{ inputs.profile }} --year ${{ inputs.year }}

      - name: Run Backfill (re-process all)
        if: ${{ inputs.no_skip }}
        env:
          DEBUG: ''
          PYTHONUNBUFFERED: '1'
          WSR_PROFILE: ${{ inputs.profile }}
        run: |
          echo "🔄 Backfilling ${{ inputs.profile }} — Year ${{ inputs.year }} (re-processing all)"
          python wsr_backfill.py --profile ${{ inputs.profile }} --year ${{ inputs.year }} --no-skip

      - name: Upload error screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ inputs.profile }}-${{ inputs.year }}-errors
          path: '*.png'
          retention-days: 7
          if-no-files-found: ignore

      - name: Create Run Summary
        if: always()
        run: |
          echo "# WSR Backfill — ${{ inputs.profile == 'km' && 'Kerr-McCauley' || 'MikLin/Mulligan' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile**: ${{ inputs.profile }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Year**: ${{ inputs.year }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Re-process all**: ${{ inputs.no_skip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the job logs for per-week results." >> $GITHUB_STEP_SUMMARY
